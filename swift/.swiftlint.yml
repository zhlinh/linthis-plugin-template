# SwiftLint Configuration for linthis-plugin-template Plugin
# Documentation: https://realm.github.io/SwiftLint/
#
# This file configures SwiftLint for Swift projects.
# Run with: swiftlint lint

# ============================================================================
# DISABLED RULES
# ============================================================================
# Rules to disable (less strict)
disabled_rules:
  - force_cast           # Allow force casting with `as!`
  - force_try            # Allow force try with `try!`

# ============================================================================
# OPT-IN RULES
# ============================================================================
# Additional rules to enable
opt_in_rules:
  - empty_count          # Prefer checking isEmpty over count == 0

# ============================================================================
# LINE LENGTH
# ============================================================================
line_length:
  warning: 120
  error: 150
  ignores_function_declarations: false
  ignores_comments: false
  ignores_urls: true

# ============================================================================
# TYPE BODY LENGTH
# ============================================================================
type_body_length:
  warning: 300
  error: 400

# ============================================================================
# FUNCTION BODY LENGTH
# ============================================================================
function_body_length:
  warning: 50
  error: 100

# ============================================================================
# FILE LENGTH
# ============================================================================
file_length:
  warning: 500
  error: 1000
  ignore_comment_only_lines: true

# ============================================================================
# CYCLOMATIC COMPLEXITY
# ============================================================================
cyclomatic_complexity:
  warning: 10
  error: 20

# ============================================================================
# IDENTIFIER NAMING
# ============================================================================
identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 40
    error: 50
  excluded:
    - id
    - URL
    - x
    - y

# ============================================================================
# EXCLUDED FILES
# ============================================================================
excluded:
  - Pods
  - .build
  - DerivedData
  - Carthage
  - vendor
